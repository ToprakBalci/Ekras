    <style>

        body { background-color: #f4f6f9; display: flex; flex-direction: column; height: 100vh; }

        .menu-item:hover, .menu-item.active { background-color: #eff6ff; color: #2563eb; border-left: 4px solid #2563eb; }
        .menu-item i { width: 18px; font-size: 15px; }
        .content { flex: 1; padding: 25px; }
        .card { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; }

</head>
